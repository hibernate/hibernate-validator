name: "GH Actions TCK report"

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'

concurrency:
  group: "workflow = ${{ github.workflow }}, ref = ${{ github.event.ref }}, pr = ${{ github.event.pull_request.id }}"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  MAVEN_ARGS: "-e -B --settings .github/mvn-settings.xml --fail-at-end -Pci-build --no-transfer-progress -Dscan=false -Dno-build-cache -Denforcer.skip=true"
  REPORT_FILE: "Hibernate-Validator-${{github.ref_name}}-Jakarta-Validation-TCK-Results.asciidoc"

permissions:
  contents: read

jobs:
  build:
    name: JDK ${{ matrix.java-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest ]
        java-version: [ '17', '21' ]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false

      - name: Set up Java ${{ matrix.java-version }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # 5.2.0
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin

      - name: Start building the asciidoc report
        id: init-report
        env:
          LOCAL_REPORT_FILE: ${{ env.REPORT_FILE }}
          REF_NAME: ${{github.ref_name}}
        run: |
          echo "== Hibernate Validator $REF_NAME Jakarta Validation 3.1 TCK Results" > "$LOCAL_REPORT_FILE"
          {
            echo ""
            echo "The following sections contain the test results and environment information for this TCK run."
            echo ""
            echo "=== The build system information"
            echo ""
            
            echo ".Operating system details"
            echo "[source,bash]"
            echo "----"
            uname -a
            echo "----"
            echo ""
  
            echo ".JDK information"
            echo "[source,bash]"
            echo "----"
            java -version 2>&1
            echo "----"
            echo ""
  
            echo ".Maven information"
            echo "[source,bash]"
            echo "----"
            mvn -v
            echo "----"
            echo ""
            
            echo "=== Test results"
            echo "" 
          } >> "$LOCAL_REPORT_FILE"  

      - name: TCK in standalone mode
        id: tck-standalone
        env:
          LOCAL_REPORT_FILE: ${{ env.REPORT_FILE }}
          REF_NAME: ${{github.ref_name}}
          JAVA_VERSION: ${{matrix.java-version}}
        run: |
          read -ra mvn_args <<< "$MAVEN_ARGS"
          ./mvnw "${mvn_args[@]}" clean verify -pl :hibernate-validator-build-enforcer,:hibernate-validator-build-config,:hibernate-validator-tck-runner
          
          {
            echo ".TCK tests in the standalone mode"
            echo "[source,bash]"
            echo "----"
            cat tck-runner/target/surefire-reports/TestSuite-default.txt
            echo "----"
            echo ""
            echo "Test results available for the download are link:tck-standalone-report-$REF_NAME-$JAVA_VERSION.html[here]."
            echo ""
          } >> "$LOCAL_REPORT_FILE"

      - name: Upload TCK Report as an Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
        with:
          name: tck-standalone-report-html-${{matrix.java-version}}
          path: tck-runner/target/surefire-reports/emailable-report.html

      - name: TCK in container mode
        id: tck-container
        env:
          LOCAL_REPORT_FILE: ${{ env.REPORT_FILE }}
          REF_NAME: ${{github.ref_name}}
          JAVA_VERSION: ${{matrix.java-version}}
        run: |
          read -ra mvn_args <<< "$MAVEN_ARGS"
          ./mvnw "${mvn_args[@]}" clean verify -pl :hibernate-validator-build-enforcer,:hibernate-validator-build-config,:hibernate-validator-tck-runner -Dincontainer -Dincontainer-prepared

          {
            echo ".TCK tests in the container mode"
            echo "[source,bash]"
            echo "----"
            cat tck-runner/target/surefire-reports/TestSuite-default.txt
            echo "----"
            echo ""
            echo "Test results available for the download are link:tck-container-report-$REF_NAME-$JAVA_VERSION.html[here]."
            echo ""
          } >> "$LOCAL_REPORT_FILE"
          
      - name: Upload TCK Report as an Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
        with:
          name: tck-container-report-html-${{matrix.java-version}}
          path: tck-runner/target/surefire-reports/emailable-report.html

      - name: Signature test
        id: tck-sigtest
        env:
          LOCAL_REPORT_FILE: ${{ env.REPORT_FILE }}
          REF_NAME: ${{github.ref_name}}
          JAVA_VERSION: ${{matrix.java-version}}
        run: |
          read -ra mvn_args <<< "$MAVEN_ARGS"
          ./mvnw "${mvn_args[@]}" clean verify -pl :hibernate-validator-build-enforcer,:hibernate-validator-build-config,:hibernate-validator-tck-runner -Psigtest

          {
            echo ".Signature test results"
            echo "[source,bash]"
            echo "----"
            cat tck-runner/target/surefire-reports/sigtest/report.xml
            echo "----"
            echo ""
            echo "Test results available for the download are link:tck-signature-report-$REF_NAME-$JAVA_VERSION.xml[here]."
            echo ""
          } >> "$LOCAL_REPORT_FILE"

      - name: Upload TCK Report as an Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
        with:
          name: tck-signature-report-xml-${{matrix.java-version}}
          path: tck-runner/target/surefire-reports/sigtest/report.xml

      - name: Finish asciidoc report
        id: final-report
        env:
          LOCAL_REPORT_FILE: ${{ env.REPORT_FILE }}
          REF_NAME: ${{github.ref_name}}
          JAVA_VERSION: ${{matrix.java-version}}
        run: |
          {
            echo "=== File signatures"
            echo ""
            
            echo ".SHA256 validation-tck-distribution.zip"
            echo "[source,bash]"
            echo "----"
            sha256sum tck-runner/target/tck-dependencies/validation-tck-distribution.zip
            echo "----"
            echo ""
            
            echo ".SHA256 validation-tck-tests.jar"
            echo "[source,bash]"
            echo "----"
            sha256sum tck-runner/target/tck-dependencies/validation-tck-tests.jar
            echo "----"
            echo ""
            
            echo ".SHA256 jakarta.validation-api.jar"
            echo "[source,bash]"
            echo "----"
            sha256sum tck-runner/target/tck-dependencies/jakarta.validation-api.jar
            echo "----"
            echo ""
          } >> "$LOCAL_REPORT_FILE"
          
          echo "Report output:"
          cat "$LOCAL_REPORT_FILE"

      - name: Upload Final Report as an Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
        with:
          name: final-report-${{matrix.java-version}}
          path: ${{ env.REPORT_FILE }}

